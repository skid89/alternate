<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alternate.lol - Admin</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
            padding: 20px;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: #888;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: black;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn:hover {
            background: #ccc;
        }
        /* Top Tabs styling */
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .admin-tab {
            background: none;
            border: none;
            color: #888;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .admin-tab.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .admin-tab:hover {
            color: white;
        }
        
        /* Sub Tabs styling */
        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .sub-tab {
            background: #111;
            border: 1px solid #333;
            color: #888;
            cursor: pointer;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .sub-tab.active {
            background: white;
            color: black;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sub-tab-content { display: none; }
        .sub-tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="background-pattern"></div>
    <div id="mouse-glow"></div>

    <div class="admin-container">
        
        <!-- Login Form -->
        <div id="login-section" class="login-box">
            <h1 style="color: white; margin-bottom: 30px;">Admin Portal</h1>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="admin-password" placeholder="Enter password...">
            </div>
            <!-- Turnstile Widget -->
            <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>
            
            <button id="login-btn" class="login-btn">Login</button>
            <p id="login-error" style="color: #ef4444; margin-top: 15px; display: none;"></p>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboard-content" class="hidden" style="width: 100%; max-width: 800px; margin-top: 50px;">
            
            <div style="background: rgba(10, 10, 10, 0.9); padding: 30px; border-radius: 12px; border: 1px solid #333; width: 100%;">
                
                <div class="admin-tabs">
                    <button class="admin-tab active" data-tab="tab-mainlink">Main Link (CMS)</button>
                    <button class="admin-tab" data-tab="tab-keys">Key Stock</button>
                </div>

                <!-- Main Link / CMS Tab -->
                <div id="tab-mainlink" class="tab-content active">
                    <h2 style="color: white; margin-bottom: 10px; font-size: 1.2rem;">Showcase Settings</h2>
                    <div class="input-group">
                        <label>YouTube Showcase Link</label>
                        <input type="text" id="cms-showcase" placeholder="https://youtube.com/...">
                    </div>
                    
                    <h2 style="color: white; margin-bottom: 10px; font-size: 1.2rem; margin-top: 30px;">Information Manager</h2>
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-sub="sub-features">Feature List</button>
                        <button class="sub-tab" data-sub="sub-executors">Supported Executors</button>
                        <button class="sub-tab" data-sub="sub-games">Supported Games</button>
                    </div>

                    <div id="sub-features" class="sub-tab-content active">
                        <div class="input-group">
                            <label>Features (HTML format)</label>
                            <textarea id="cms-features" rows="6"><li>Aimbot</li><li>ESP</li></textarea>
                        </div>
                    </div>
                    <div id="sub-executors" class="sub-tab-content">
                        <div class="input-group">
                            <label>Supported Executors (HTML format)</label>
                            <textarea id="cms-executors" rows="6"><li>Synapse</li><li>Krnl</li></textarea>
                        </div>
                    </div>
                    <div id="sub-games" class="sub-tab-content">
                        <div class="input-group">
                            <label>Supported Games (HTML format)</label>
                            <textarea id="cms-games" rows="6"><li>Arsenal</li><li>Phantom Forces</li></textarea>
                        </div>
                    </div>

                    <h2 style="color: white; margin-bottom: 10px; font-size: 1.2rem; margin-top: 30px;">Crypto Addresses (Manual Payment)</h2>
                    <div class="input-group">
                        <label>BTC Address</label>
                        <input type="text" id="cms-crypto-btc" placeholder="bc1qxy...">
                    </div>
                    <div class="input-group">
                        <label>LTC Address</label>
                        <input type="text" id="cms-crypto-ltc" placeholder="ltc1qxy...">
                    </div>
                    <div class="input-group">
                        <label>ETH Address</label>
                        <input type="text" id="cms-crypto-eth" placeholder="0x...">
                    </div>

                    <button id="save-cms-btn" class="login-btn" style="margin-top: 10px;">Save All Website Content</button>
                </div>

                <!-- Keys Tab -->
                <div id="tab-keys" class="tab-content">
                    <div class="sub-tabs">
                        <button class="sub-tab active" data-sub="sub-upload">Bulk Upload</button>
                        <button class="sub-tab" data-sub="sub-manager">Key Manager</button>
                    </div>

                    <div id="sub-upload" class="sub-tab-content active">
                        <div style="margin-bottom: 20px;">
                            <span style="color: #888;">Current Real Stock: </span>
                            <span id="key-stock" style="color: #4ade80; font-size: 1.5rem; font-weight: bold;">...</span>
                        </div>
                        <div class="input-group">
                            <label>Bulk Upload License Keys (One per line)</label>
                            <textarea id="new-key-input" rows="8" placeholder="XXXX-YYYY-ZZZZ&#10;AAAA-BBBB-CCCC" style="margin-bottom: 10px; resize: vertical;"></textarea>
                            <button id="add-key-btn" class="login-btn">Upload Keys</button>
                        </div>
                    </div>

                    <div id="sub-manager" class="sub-tab-content">
                        <h2 style="color: white; margin-bottom: 15px; font-size: 1.2rem;">All Keys</h2>
                        <div style="max-height: 300px; overflow-y: auto; background: #0a0a0a; border: 1px solid #333; border-radius: 6px; padding: 10px;">
                            <table style="width: 100%; text-align: left; border-collapse: collapse; color: white;">
                                <thead>
                                    <tr style="border-bottom: 1px solid #333;">
                                        <th style="padding: 10px;">Key</th>
                                        <th style="padding: 10px; width: 100px;">Status</th>
                                    </tr>
                                </thead>
                                <tbody id="key-manager-list">
                                    <tr><td colspan="2" style="padding: 10px; text-align: center; color: #888;">Loading keys...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                
            </div>
            
            <button class="login-btn" style="margin-top: 20px; background: #ef4444; width: auto; padding: 10px 30px; float: right; color: white;" onclick="location.reload()">Logout</button>
            <div style="clear: both;"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
